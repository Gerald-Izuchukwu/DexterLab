name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

  build:
    name: Build and smoke-test image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          tags: wallet-app:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and check health endpoint
        run: |
          docker run -d --name wallet-app -p 8080:8080 wallet-app:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for service to be ready ($i/10)..."
            sleep 2
          done
          echo "Health check failed"
          docker logs wallet-app
          exit 1

      - name: Container logs
        if: always()
        run: docker logs wallet-app || true

  terraform:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate
