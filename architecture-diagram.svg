<svg width="680" height="640" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AWS architecture for the digital wallet backend</title>
<desc>A VPC containing a public subnet with an application load balancer and NAT gateway, a private compute subnet running three ECS Fargate services (auth, transactions, KYC), and a private data subnet with a Multi-AZ RDS PostgreSQL instance. External AWS managed services, Secrets Manager and an S3 bucket for KYC documents, connect into the VPC from below.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="120" y="20" width="180" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="210" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Mobile app users</text>
<line x1="210" y1="60" x2="210" y2="163" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="95" width="560" height="445" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="600" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">AWS VPC — 10.0.0.0/16</text>

<rect x="90" y="135" width="500" height="100" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="580" y="154" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Public subnet</text>

<rect x="120" y="165" width="180" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="210" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">Load balancer</text>
<text x="210" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">TLS termination</text>

<rect x="330" y="165" width="180" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="420" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">NAT gateway</text>
<text x="420" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">Outbound only</text>

<line x1="210" y1="215" x2="210" y2="253" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="225" y="244" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Routes by path</text>

<rect x="90" y="255" width="500" height="150" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="580" y="274" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Private subnet — compute</text>

<rect x="110" y="290" width="140" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="180" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Auth service</text>
<text x="180" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Task IAM role</text>

<rect x="270" y="290" width="140" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Transactions</text>
<text x="340" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Payment ledger</text>

<rect x="430" y="290" width="140" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="500" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">KYC service</text>
<text x="500" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Doc verify</text>

<line x1="340" y1="360" x2="340" y2="423" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="425" width="500" height="80" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="580" y="444" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Private subnet — data</text>

<rect x="240" y="455" width="200" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">RDS PostgreSQL</text>
<text x="340" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">Multi-AZ + encrypted</text>

<line x1="200" y1="540" x2="200" y2="563" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="540" x2="480" y2="563" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="75" y="565" width="250" height="55" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="587" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Secrets Manager</text>
<text x="200" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">DB creds, API keys</text>

<rect x="355" y="565" width="250" height="55" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="480" y="587" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">S3 — KYC documents</text>
<text x="480" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">SSE-KMS, VPC endpoint</text>
</svg>
